<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
</head>
<body>

<h1>Products</h1>

<!-- Back to home -->
<a href="/">Back to Home</a>

<!-- Add product -->
<h2>Add Product</h2>
<form action="/add_product" method="POST">

    <!-- Inputs -->
    <input type="text" name="name" placeholder="Product Name" required>
    <input type="number" name="price" placeholder="Price" required>
    <input type="number" name="quantity" placeholder="Quantity" required>

    <!-- Supplier dropdown -->
    <select name="supplier_id">
        {% for s in suppliers %}
        <option value="{{ s[0] }}">{{ s[1] }}</option>
        {% endfor %}
    </select>

    <button type="submit">Add Product</button>
</form>

<!-- Product table -->
<h2>Product List</h2>
<table border="1">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Supplier</th>
        <th>Action</th>
    </tr>

    {% for p in products %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>{{ p[2] }}</td>
        <td>{{ p[3] }}</td>

        <!-- Supplier name from JOIN -->
        <td>{{ p[4] }}</td>

        <!-- Actions -->
        <td>
            <a href="/edit/{{ p[0] }}">Edit</a> |
            <a href="/delete/{{ p[0] }}">Delete</a>
        </td>

    </tr>
    {% endfor %}

</table>

</body>
</html>
