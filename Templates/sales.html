<!DOCTYPE html>
<html>
<head>
    <title>Sales</title>
</head>
<body>
<h1>Sales</h1>
<a href="/">Back to Home</a>
<h2>Add Sale</h2>
<form action="/add_sale" method="POST">
    <select name="product_id">
        {% for p in products %}
        <option value="{{ p[0] }}">{{ p[1] }}</option>
        {% endfor %}
    </select>
    <input type="number" name="quantity" placeholder="Quantity" required>
    <input type="date" name="sale_date" required>
    <button type="submit">Add Sale</button>
</form>
<h2>Sales Records</h2>
<table border="1">
    <tr><th>ID</th><th>Product</th><th>Quantity</th><th>Date</th></tr>
    {% for s in sales %}
    <tr><td>{{ s[0] }}</td><td>{{ s[1] }}</td><td>{{ s[2] }}</td><td>{{ s[3] }}</td></tr>
    {% endfor %}
</table>
</body>
</html>
