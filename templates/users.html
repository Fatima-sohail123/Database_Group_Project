<!DOCTYPE html>
<html>
<head>
    <title>Users</title>
</head>
<body>

<h1>Users</h1>
<a href="/">Back to Home</a>

<h2>Add New User</h2>
<form action="/add_user" method="POST">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <select name="role">
        <option value="Employee">Employee</option>
        <option value="Admin">Admin</option>
    </select>
    <button type="submit">Add User</button>
</form>

<hr>

<h2>User List</h2>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
        <th>Action</th>
    </tr>
    {% for u in users %}
    <tr>
        <td>{{ u.user_id }}</td>
        <td>{{ u.name }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.role }}</td>
        <td>
            <a href="/edit_user/{{ u.user_id }}">Edit</a> |
            <a href="/delete_user/{{ u.user_id }}" onclick="return confirm('Delete this user?')">Delete</a>
    </tr>
    {% endfor %}
</table>

</body>
</html>
