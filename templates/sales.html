<!DOCTYPE html>
<html>
<head>
    <title>Sales</title>
</head>
<body>
<h1>Sales</h1>
<a href="/">Back to Home</a>

<h2>Add Sale</h2>
<form action="/add_sale" method="POST">
    <select name="product_id" required>
        <option value="">-- Select Product --</option>
        {% for p in products %}
            <option value="{{ p.product_id }}">{{ p.name }}</option>
        {% endfor %}
    </select>
    <input type="number" name="quantity" placeholder="Quantity" required>
    <input type="date" name="sale_date" required>
    <button type="submit">Add Sale</button>
</form>

<h2>Sales Records</h2>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Product</th>
        <th>Quantity</th>
        <th>Date</th>
        <th>Action</th>
    </tr>
    {% for s in sales %}
    <tr>
        <td>{{ s.sale_id }}</td>
        <td>{{ s.product_name }}</td>
        <td>{{ s.quantity }}</td>
        <td>{{ s.sale_date }}</td>
        <td><a href="/delete_sale/{{ s.sale_id }}" onclick="return confirm('Delete this sale record?')">Delete</a></td>
    </tr>
    {% endfor %}
</table>
</body>
</html>
