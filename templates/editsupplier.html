<!DOCTYPE html>
<html>
<head>
    <title>Edit Supplier</title>
</head>
<body>
    <h1>Edit Supplier</h1>
    <a href="/suppliers">Back to Suppliers</a>

    <form action="/update_supplier" method="POST">
        <input type="hidden" name="supplier_id" value="{{ supplier.supplier_id }}">

        <label>Supplier Name:</label><br>
        <input type="text" name="name" value="{{ supplier.name }}" required><br><br>

        <label>Phone:</label><br>
        <input type="text" name="phone" value="{{ supplier.phone }}"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" value="{{ supplier.email }}" required><br><br>

        <button type="submit">Update Supplier</button>
    </form>
</body>
</html>
