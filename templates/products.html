<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
</head>
<body>
<h1>Products</h1>
<a href="/">Back to Home</a>
<h2>Add Product</h2>
<form action="/add_product" method="POST">
    <input type="text" name="name" placeholder="Product Name" required>
    <input type="number" name="price" placeholder="Price" required>
    <input type="number" name="quantity" placeholder="Quantity" required>
    <select name="supplier_id" required>
    <option value="">-- Select Supplier --</option>
    {% for s in suppliers %}
    <option value="{{ s.supplier_id }}">{{ s.name }}</option>
    {% endfor %}
    </select>
    <button type="submit">Add Product</button>
</form>
<h2>Product List</h2>
<table border="1">
    <tr>
        <th>ID</th><th>Name</th><th>Price</th><th>Quantity</th><th>Supplier</th><th>Action</th>
    </tr>
    {% for p in products %}
    <tr>
    <td>{{ p.product_id }}</td>
    <td>{{ p.name }}</td>
    <td>{{ p.price }}</td>
    <td>{{ p.quantity }}</td>
    <td>{{ p.supplier_id }}</td>
    <td>
        <a href="/edit_product/{{ p.product_id }}">Edit</a>
        <a href="/delete_product/{{ p.product_id }}" onclick="return confirm('Delete this product?')">Delete</a>
    </td>
</tr>
{% endfor %}
</table>
</body>
</html>
