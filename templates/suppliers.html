<!DOCTYPE html>
<html>
<head>
    <title>Suppliers</title>
</head>
<body>
<h1>Suppliers</h1>
<a href="/">Back to Home</a>

<h2>Add Supplier</h2>
<form action="/add_supplier" method="POST">
    <input type="text" name="name" placeholder="Supplier Name" required>
    <input type="text" name="phone" placeholder="Phone" required>
    <input type="email" name="email" placeholder="Email" required>
    <button type="submit">Add Supplier</button>
</form>

<h2>Supplier List</h2>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Action<th>
    </tr>
    {% for s in suppliers %}
    <tr>
        <td>{{ s.supplier_id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.phone }}</td>
        <td>{{ s.email }}</td>
        <td>
            <a href="/edit_supplier/{{ s.supplier_id }}">Edit</a> |
            <a href="/delete_supplier/{{ s.supplier_id }}" onclick="return confirm('Delete this supplier?')">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
</body>
</html>
